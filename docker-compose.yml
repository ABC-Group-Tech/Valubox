services:
  postgres:
    image: postgres:16-alpine
    container_name: valubox-postgres
    environment:
      POSTGRES_USER: valubox
      POSTGRES_PASSWORD: valubox
      POSTGRES_DB: valubox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valubox"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: valubox-backend
    environment:
      DATABASE_URL: postgresql://valubox:valubox@postgres:5432/valubox
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: valubox-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
